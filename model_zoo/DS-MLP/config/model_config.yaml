Base:
    model_root: './checkpoints/'
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_specs: null
    feature_config: null

    
DSMLP_movielens:
    model: DSMLP
    model_id : DSMLP
    model_root : ./Movielens/DSMLP/teacher_training
    batch_size : 4096
    dataset_id: movielenslatest_x1_cd32d937
    debug : False
    embedding_dim : 10
    embedding_regularizer : 0.01
    net_regularizer : 0
    epochs : 100
    every_x_epochs : 1
    learning_rate : 0.001
    dnn_activations : relu
    dnn_hidden_units : [400,400,400]
    student_dnn_hidden_units: [1024,1024,1024]
    parallel_dnn_hidden_units: [400,400,400]
    num_cross_layers : 3
    net_dropout : 0.2
    loss : binary_crossentropy
    metrics : ['AUC','logloss']
    batch_norm : True
    seed : 2024
    monitor: AUC
    monitor_mode: max
    save_best_only : True
    task: binary_classification
    optimizer: adam
    verbose : 0
    shuffle: true
    use_hdf5: true
    alpha_e : 1
    alpha_i : 1
    phase : teacher_training


